<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单生成器</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #fff;
        }
        .order-box {
            border: 2px dashed #4CAF50;
            border-radius: 15px;
            padding: 15px 30px;
            margin: 10px;
            width: 320px;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }
        .order-box:hover {
            background-color: #f0fdf4;
        }
        .label {
            color: #4CAF50;
            font-size: 18px;
            margin-bottom: 5px;
            display: block;
        }
        .number {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            letter-spacing: 2px;
        }
        .hint {
            color: #888;
            font-size: 14px;
            margin-top: 20px;
        }
        #toast {
            position: fixed;
            top: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="toast">复制成功</div>
    <div id="container"></div>
    <p class="hint">(点击上方绿色区域直接复制，号码每秒自动跳动)</p>

    <script>
        const container = document.getElementById('container');
        const toast = document.getElementById('toast');

        // 复制功能
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                toast.style.display = 'block';
                setTimeout(() => { toast.style.display = 'none'; }, 1000);
            });
        }

        // 生成纯数字编号 (类似你图1的格式)
        function generateNumber() {
            const now = new Date();
            const datePart = now.getFullYear().toString().slice(-2) + 
                             (now.getMonth() + 1).toString().padStart(2, '0') + 
                             now.getDate().toString().padStart(2, '0');
            const randomPart = Math.floor(Math.random() * 1000000).toString().padStart(6, '0');
            return datePart + randomPart;
        }

        // 初始化 14 个框
        for (let i = 0; i < 14; i++) {
            const box = document.createElement('div');
            box.className = 'order-box';
            box.innerHTML = `
                <span class="label">● 正在实时生成每秒唯一编号</span>
                <div class="number" id="num-${i}">加载中...</div>
            `;
            box.onclick = function() {
                const numText = document.getElementById(`num-${i}`).innerText;
                copyToClipboard(numText);
            };
            container.appendChild(box);
        }

        // 每秒更新所有 14 个号码，并确保不重复
        function updateAllNumbers() {
            const usedNumbers = new Set();
            for (let i = 0; i < 14; i++) {
                let newNum;
                do {
                    newNum = generateNumber();
                } while (usedNumbers.has(newNum)); // 确保这14个号互不相同
                
                usedNumbers.add(newNum);
                document.getElementById(`num-${i}`).innerText = newNum;
            }
        }

        setInterval(updateAllNumbers, 1000);
        updateAllNumbers();
    </script>
</body>
</html>
