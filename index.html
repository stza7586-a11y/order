<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理系统</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #1a73e8; font-size: 20px; margin-bottom: 20px; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; }
        .order-item { 
            padding: 12px; margin: 8px 0; border: 1px solid #eee; border-radius: 6px; 
            cursor: pointer; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center;
        }
        .order-item:hover { background-color: #e8f0fe; border-color: #1a73e8; transform: scale(1.02); }
        .order-item:active { background-color: #d2e3fc; }
        .copy-hint { font-size: 12px; color: #1a73e8; font-weight: bold; }
        #toast { 
            position: fixed; top: 20px; background: #323232; color: white; padding: 10px 20px; 
            border-radius: 5px; display: none; z-index: 100; 
        }
    </style>
</head>
<body>

    <div id="toast">已成功复制到剪贴板</div>

    <div class="card">
        <h2>实时订单列表 (14个 - 点击复制)</h2>
        <div id="orderList"></div>
    </div>

    <script>
        // 显示复制成功的提示
        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 1500);
        }

        // 复制函数
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast();
            });
        }

        // 生成不重复的订单号集
        function updateOrders() {
            const listElement = document.getElementById('orderList');
            const orders = new Set(); // 使用 Set 确保这 14 个绝对不重复
            
            // 循环直到凑满 14 个不同的号码
            while(orders.size < 14) {
                const datePart = new Date().getTime().toString().slice(-6);
                const randomPart = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
                orders.add("ORD" + datePart + randomPart);
            }

            listElement.innerHTML = '';
            orders.forEach(orderId => {
                const div = document.createElement('div');
                div.className = 'order-item';
                div.innerHTML = `<span>订单号: <strong>${orderId}</strong></span> <span class="copy-hint">点击复制</span>`;
                div.onclick = () => copyText(orderId);
                listElement.appendChild(div);
            });
        }

        // 初始化
        updateOrders();
        // 如果你需要它每秒自动变，取消下面这一行的注释：
        // setInterval(updateOrders, 1000); 
    </script>
</body>
</html>
