<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>14位订单生成器</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #fff;
        }
        .order-box {
            border: 2px dashed #4CAF50;
            border-radius: 15px;
            padding: 15px 30px;
            margin: 10px;
            width: 380px; /* 稍微加宽一点以适应14位数字 */
            text-align: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .order-box:hover {
            background-color: #f0fdf4;
        }
        .label {
            color: #4CAF50;
            font-size: 16px;
            margin-bottom: 5px;
            display: block;
        }
        .number {
            font-size: 30px;
            font-weight: bold;
            color: #333;
            letter-spacing: 1px;
        }
        #toast {
            position: fixed;
            top: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="toast">复制成功</div>
    <div id="container"></div>
    <p style="color: #888; font-size: 14px;">(点击上方区域复制，14位编号每秒自动跳动)</p>

    <script>
        const container = document.getElementById('container');
        const toast = document.getElementById('toast');

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                toast.style.display = 'block';
                setTimeout(() => { toast.style.display = 'none'; }, 1000);
            });
        }

        // 生成 14 位订单号: yyMMddHHmmss + 2位随机数
        function generate14DigitOrder() {
            const now = new Date();
            const yy = now.getFullYear().toString().slice(-2);
            const mm = (now.getMonth() + 1).toString().padStart(2, '0');
            const dd = now.getDate().toString().padStart(2, '0');
            const hh = now.getHours().toString().padStart(2, '0');
            const min = now.getMinutes().toString().padStart(2, '0');
            const ss = now.getSeconds().toString().padStart(2, '0');
            
            // 补足最后 2 位随机数，达到 14 位
            const randomPart = Math.floor(Math.random() * 100).toString().padStart(2, '0');
            
            return yy + mm + dd + hh + min + ss + randomPart;
        }

        // 依然生成 14 个展示框，每个框内都是 14 位的号码
        for (let i = 0; i < 14; i++) {
            const box = document.createElement('div');
            box.className = 'order-box';
            box.innerHTML = `
                <span class="label">● 正在实时生成每秒唯一编号</span>
                <div class="number" id="num-${i}">加载中...</div>
            `;
            box.onclick = function() {
                const numText = document.getElementById(`num-${i}`).innerText;
                copyToClipboard(numText);
            };
            container.appendChild(box);
        }

        function updateAll() {
            for (let i = 0; i < 14; i++) {
                document.getElementById(`num-${i}`).innerText = generate14DigitOrder();
            }
        }

        setInterval(updateAll, 1000);
        updateAll();
    </script>
</body>
</html>
